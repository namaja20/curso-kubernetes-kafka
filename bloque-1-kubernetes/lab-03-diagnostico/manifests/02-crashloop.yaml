apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop
  namespace: lab03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop
  template:
    metadata:
      labels:
        app: crashloop
    spec:
      containers:
        - name: app
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Iniciando..."
              sleep 2
              echo "Algo fue mal" >&2
              exit 1
