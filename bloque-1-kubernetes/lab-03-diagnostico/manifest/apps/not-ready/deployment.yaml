apiVersion: apps/v1
kind: Deployment
metadata:
  name: not-ready
  namespace: lab03
spec:
  replicas: 2
  selector:
    matchLabels:
      app: not-ready
  template:
    metadata:
      labels:
        app: not-ready
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /esto-no-existe
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 3
            failureThreshold: 2
