apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: lab04
  labels:
    app: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
        - name: demo
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "==== ENV ===="
              echo "GREETING=$GREETING"
              echo "LOG_LEVEL=$LOG_LEVEL"
              echo "API_TOKEN=$API_TOKEN"
              echo "==== /etc/app/app.properties ===="
              cat /etc/app/app.properties
              echo "==== loop ===="
              while true; do
                echo "[$(date +%T)] alive, GREETING=$GREETING"
                sleep 10
              done
          env:
            - name: GREETING
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: GREETING
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: API_TOKEN
          volumeMounts:
            - name: app-config
              mountPath: /etc/app
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
      volumes:
        - name: app-config
          configMap:
            name: app-config
            items:
              - key: app.properties
                path: app.properties
